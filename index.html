<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ЪҜШ§Щ„ШұЫҢ Ш·ШұШӯвҖҢЩҮШ§ЫҢ DXF v6 | CNC LAND</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#09111f">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* в”Җв”Җ ШӘШ№ШұЫҢЩҒ ШӘЩ… ШӘШ§ШұЫҢЪ©Щҗ Ш§Ш®ШӘШөШ§ШөЫҢ Щ„ЩҲЪ©Ші ШЁШұШ§ЫҢ CNC LAND в”Җв”Җ */
:root {
  --color-background-primary: #0F1015;
  --color-background-secondary: #161822;
  --color-border-secondary: #2A2E3D;
  --color-border-tertiary: #1E212B;
  --color-text-primary: #F3F4F6;
  --color-text-secondary: #9CA3AF;
  --color-text-tertiary: #6B7280;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,'Segoe UI',sans-serif;direction:rtl;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary)}

/* в”Җв”Җ Layout в”Җв”Җ */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;border-left:.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;background:var(--color-background-secondary)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* в”Җв”Җ Sidebar в”Җв”Җ */
.sidebar-header{padding:14px 14px 10px;border-bottom:.5px solid var(--color-border-tertiary)}
.sidebar-header h1{font-size:14px;font-weight:600;color:#00F0FF;display:flex;align-items:center;gap:6px;text-shadow: 0 0 8px rgba(0,240,255,0.3)}
.sidebar-header p{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.cat-section{padding:10px 10px 6px;font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.5px}
.cat-list{flex:1;overflow-y:auto;padding:0 6px}
.cat-item{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:8px;cursor:pointer;border:none;background:none;font-family:inherit;font-size:12px;color:var(--color-text-primary);width:100%;text-align:right;transition:.12s;position:relative}
.cat-item:hover{background:var(--color-background-primary)}
.cat-item.active{background:#378ADD;color:#fff}
.cat-item .ci{font-size:15px;opacity:.7;flex-shrink:0}
.cat-item.active .ci{opacity:1}
.cat-item .cn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-item .cc{font-size:10px;background:rgba(0,0,0,.2);padding:1px 6px;border-radius:10px;flex-shrink:0;color:var(--color-text-secondary)}
.cat-item.active .cc{background:rgba(255,255,255,.25);color:#fff}
.cat-item.drop-over{background:#112942!important;border:1.5px dashed #378ADD;color:#378ADD}
.cat-sep{height:.5px;background:var(--color-border-tertiary);margin:6px 10px}

/* в”Җв”Җ ШІЫҢШұЩ…Ш¬Щ…ЩҲШ№ЩҮ в”Җв”Җ */
.cat-children{overflow:hidden;transition:max-height .2s ease}
.cat-item.sub{padding-right:22px;font-size:11px}
.cat-item.sub .ci{font-size:13px}
.cat-toggle{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);padding:0 2px;font-size:11px;flex-shrink:0;line-height:1;transition:.15s}
.cat-toggle:hover{color:#fff}
.cat-item:hover .cat-actions{opacity:1}
.cat-actions{display:flex;gap:2px;opacity:0;transition:.15s;flex-shrink:0}
.cat-act-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);padding:1px 3px;font-size:12px;border-radius:4px;transition:.1s;line-height:1}
.cat-act-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.cat-act-btn.red:hover{color:#E24B4A}

.new-cat-row{padding:8px 10px;display:flex;gap:5px;border-top:.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.new-cat-inp{flex:1;padding:5px 8px;font-size:12px;border:.5px solid var(--color-border-secondary);border-radius:7px;font-family:inherit;background:var(--color-background-primary);color:var(--color-text-primary);min-width:0}
.new-cat-inp:focus{outline:none;border-color:#378ADD}
.new-cat-btn{padding:5px 9px;border:.5px solid var(--color-border-secondary);border-radius:7px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);font-size:14px;transition:.12s}
.new-cat-btn:hover{background:#378ADD;color:#fff;border-color:#378ADD}

/* в”Җв”Җ Topbar в”Җв”Җ */
.topbar{padding:10px 14px;border-bottom:.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--color-background-secondary)}
.topbar-title{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-left:4px}
.topbar-count{font-size:11px;color:var(--color-text-secondary)}
.search-inp{flex:1;max-width:220px;padding:6px 10px;font-size:12px;border:.5px solid var(--color-border-secondary);border-radius:8px;font-family:inherit;background:var(--color-background-primary);color:var(--color-text-primary)}
.search-inp:focus{outline:none;border-color:#378ADD}
.spacer{flex:1}
.icon-btn{padding:5px 8px;border:.5px solid var(--color-border-secondary);border-radius:7px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);font-size:14px;transition:.12s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;font-family:inherit;font-size:12px}
.icon-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.icon-btn.primary{background:#378ADD;color:#fff;border-color:#378ADD}
.icon-btn.primary:hover{background:#185FA5}
.icon-btn.danger{background:#E24B4A;color:#fff;border-color:#E24B4A}
.size-grp{display:flex;gap:2px}
.sz-btn{padding:5px 8px;border:.5px solid var(--color-border-secondary);border-radius:7px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);font-size:14px;transition:.12s}
.sz-btn:hover{background:var(--color-background-secondary)}
.sz-btn.on{background:#378ADD;color:#fff;border-color:#378ADD}

/* в”Җв”Җ Gallery в”Җв”Җ */
.gallery-wrap{flex:1;overflow-y:auto;padding:20px;background:var(--color-background-primary)}
.gallery-grid{display:grid;gap:12px}
.gcard{border:1px solid var(--color-border-tertiary);border-radius:18px;overflow:hidden;background:var(--color-background-secondary);cursor:grab;transition:.25s;position:relative;user-select:none}
.gcard:hover{border-color:#00F0FF;box-shadow:0 12px 35px rgba(0,240,255,0.25);transform:translateY(-6px)}
.gcard.dragging{opacity:.45;cursor:grabbing;transform:scale(.97)}
.gcard.sel{border-color:#378ADD;border-width:1.5px;box-shadow:0 0 0 2px rgba(55,138,221,.2)}
.gcard-canvas{display:block;width:100%;background:#13151C;border-bottom:.5px solid var(--color-border-tertiary)}
.gcard-info{padding:8px 10px}
.gcard-name{font-size:15px;font-weight:700;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcard-meta{font-size:12px;color:var(--color-text-secondary);margin-top:6px}
.gcard-cat{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:2px 6px;border-radius:10px;background:#1A2E44;color:#6CB1F2;margin-top:4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gcard-sel{position:absolute;top:6px;right:6px;width:16px;height:16px;cursor:pointer;accent-color:#378ADD;z-index:2}
.gcard-actions{position:absolute;bottom:0;left:0;right:0;display:flex;opacity:0;transition:.15s;background:rgba(22,24,34,.95);border-top:.5px solid var(--color-border-tertiary)}
.gcard:hover .gcard-actions{opacity:1}
.ga-btn{flex:1;padding:6px 0;font-size:10px;border:none;background:none;cursor:pointer;color:var(--color-text-secondary);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:2px;transition:.12s}
.ga-btn:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.ga-btn.red:hover{color:#E24B4A}

/* в”Җв”Җ Upload zone в”Җв”Җ */
.upload-zone{border:1.5px dashed var(--color-border-secondary);border-radius:10px;padding:2.5rem;text-align:center;cursor:pointer;background:var(--color-background-secondary);transition:.2s;margin:12px 14px}
.upload-zone:hover,.upload-zone.drag{border-color:#00F0FF;background:#11252B}
.upload-zone i{font-size:40px;color:#00F0FF;display:block;margin-bottom:8px;text-shadow: 0 0 10px rgba(0,240,255,0.4)}
.upload-zone p{font-size:13px;color:var(--color-text-primary);margin-bottom:4px}
.upload-zone span{font-size:11px;color:var(--color-text-tertiary)}

/* в”Җв”Җ Empty state в”Җв”Җ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--color-text-secondary);padding:2rem}
.empty-state i{font-size:48px;color:var(--color-text-tertiary)}
.empty-state p{font-size:13px}

/* в”Җв”Җ Progress в”Җв”Җ */
.progress{height:3px;background:var(--color-background-secondary);display:none;flex-shrink:0}
.progress.show{display:block}
.pfill{height:100%;background:#00F0FF;box-shadow: 0 0 8px #00F0FF;transition:width .3s}

/* в”Җв”Җ Toast в”Җв”Җ */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#222530;border:1px solid #378ADD;color:#fff;border-radius:8px;padding:8px 18px;font-size:12px;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4)}

/* в”Җв”Җ Modal в”Җв”Җ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);border-radius:12px;padding:18px;width:300px;max-width:90vw;box-shadow:0 12px 32px rgba(0,0,0,.4)}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--color-text-primary);display:flex;align-items:center;gap:7px}
.modal-cats{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;margin-bottom:14px}
.mcat{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;border:.5px solid transparent;transition:.12s;font-size:12px;color:var(--color-text-primary)}
.mcat:hover{background:var(--color-background-primary)}
.mcat.chosen{border-color:#378ADD;background:#1A2E44;color:#6CB1F2;font-weight:500}
.mcat i{font-size:16px;flex-shrink:0}
.modal-btns{display:flex;gap:7px;justify-content:flex-end}
.mbtn{padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);transition:.12s}
.mbtn:hover{background:var(--color-background-secondary)}
.mbtn.ok{background:#378ADD;color:#fff;border-color:#378ADD}

/* в”Җв”Җ Context menu в”Җв”Җ */
.ctx{position:fixed;z-index:200;background:var(--color-background-secondary);border:.5px solid var(--color-border-secondary);border-radius:9px;box-shadow:0 6px 20px rgba(0,0,0,.4);min-width:150px;display:none;overflow:hidden}
.ctx.show{display:block}
.ctx-item{padding:8px 13px;font-size:12px;cursor:pointer;color:var(--color-text-primary);display:flex;align-items:center;gap:8px;transition:.1s}
.ctx-item:hover{background:var(--color-background-primary)}
.ctx-item.red{color:#E24B4A}

/* в”Җв”Җ Detail panel в”Җв”Җ */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;display:none;align-items:center;justify-content:center}
.detail-overlay.show{display:flex}
.detail-panel{background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);border-radius:14px;width:460px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 16px 40px rgba(0,0,0,.5)}
.dp-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:.5px solid var(--color-border-tertiary)}
.dp-head h3{flex:1;font-size:14px;font-weight:600}
.dp-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--color-text-secondary);padding:2px}
.dp-canvas-wrap{background:#13151C;border-bottom:.5px solid var(--color-border-tertiary)}
.dp-canvas-wrap canvas{display:block;width:100%}
.dp-body{padding:14px 16px}
.dp-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.dp-label{font-size:11px;color:var(--color-text-secondary);flex-shrink:0}
.dp-inp{padding:4px 8px;font-size:12px;border:.5px solid var(--color-border-secondary);border-radius:7px;font-family:inherit;background:var(--color-background-primary);color:var(--color-text-primary)}
.dp-inp:focus{outline:none;border-color:#378ADD}
.dp-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--color-text-secondary);margin-bottom:12px}
.dp-layers{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px}
.dp-lr{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--color-background-primary);border-radius:7px;font-size:11px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dp-acts{display:flex;gap:6px;flex-wrap:wrap}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><i class="ti ti-layers-intersect"></i> CNC LAND</h1>
      <p>Щ…ШҜЫҢШұЫҢШӘ ЩҫЫҢШҙШұЩҒШӘЩҮ Ш·ШұШӯвҖҢЩҮШ§ЫҢ ЩҶЩӮШҙЩҮ Ъ©ШҙЫҢ</p>
    </div>
    <div class="cat-section">ШҜШіШӘЩҮвҖҢШЁЩҶШҜЫҢвҖҢЩҮШ§</div>
    <div class="cat-list" id="catList"></div>
    <div class="new-cat-row" style="flex-direction:column;gap:5px;padding:8px 10px">
      <div style="display:flex;gap:5px">
        <input class="new-cat-inp" id="newCatInp" placeholder="ЩҶШ§Щ… ШҜШіШӘЩҮ Ш¬ШҜЫҢШҜ..." maxlength="24" onkeydown="if(event.key==='Enter')addCat()" style="flex:1">
        <button class="new-cat-btn" onclick="startVoiceCat()" title="ЩҶШ§Щ… ШҜШіШӘЩҮ ШЁШ§ ШөШҜШ§"><i class="ti ti-microphone"></i></button>
        <button class="new-cat-btn" onclick="addCat()" title="Ш§ЩҒШІЩҲШҜЩҶ ШҜШіШӘЩҮ"><i class="ti ti-plus"></i></button>
      </div>
      <select id="newCatParent" style="width:100%;padding:4px 7px;font-size:11px;border:.5px solid var(--color-border-secondary);border-radius:7px;background:var(--color-background-primary);color:var(--color-text-secondary);font-family:inherit">
        <option value="">вҖ” ШЁШҜЩҲЩҶ ШІЫҢШұЩ…Ш¬Щ…ЩҲШ№ЩҮ вҖ”</option>
      </select>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topTitle">ЩҮЩ…ЩҮ Ш·ШұШӯвҖҢЩҮШ§</span>
      <span class="topbar-count" id="topCount"></span>
      <input class="search-inp" id="searchInp" placeholder="Ш¬ШіШӘШ¬ЩҲ ШЁШұ Ш§ШіШ§Ші ЩҶШ§Щ… ЫҢШ§ Щ„Ш§ЫҢЩҮ..." oninput="renderGallery()">
      <div class="spacer"></div>
      <div class="size-grp">
        <button class="sz-btn on" id="szL" onclick="setSize('L')" title="ШЁШІШұЪҜ"><i class="ti ti-layout-grid-add"></i></button>
        <button class="sz-btn" id="szM" onclick="setSize('M')" title="Щ…ШӘЩҲШіШ·"><i class="ti ti-layout-grid"></i></button>
        <button class="sz-btn" id="szS" onclick="setSize('S')" title="Ъ©ЩҲЪҶЪ©"><i class="ti ti-grid-dots"></i></button>
      </div>
      <button class="icon-btn" onclick="selAll(true)"><i class="ti ti-checks"></i> Ш§ЩҶШӘШ®Ш§ШЁ ЩҮЩ…ЩҮ</button>
      <button class="icon-btn" onclick="assignCatToSel()" id="assignBtn" style="display:none"><i class="ti ti-tag"></i> ШҜШіШӘЩҮвҖҢШЁЩҶШҜЫҢ</button>
      <button class="icon-btn danger" onclick="delSelected()" id="delSelBtn" style="display:none"><i class="ti ti-trash"></i> ШӯШ°ЩҒ Ш§ЩҶШӘШ®Ш§ШЁвҖҢШҙШҜЩҮвҖҢЩҮШ§</button>
      <button class="icon-btn" onclick="selAll(false)" id="clearSelBtn" style="display:none"><i class="ti ti-x"></i> Щ„ШәЩҲ Ш§ЩҶШӘШ®Ш§ШЁ</button>
      <button class="icon-btn" onclick="backupGallery()" title="ШҜШ§ЩҶЩ„ЩҲШҜ ЩҫШҙШӘЫҢШЁШ§ЩҶ Ъ©Ш§Щ…Щ„ ЪҜШ§Щ„ШұЫҢ (JSON)"><i class="ti ti-database-export"></i> ЩҫШҙШӘЫҢШЁШ§ЩҶвҖҢЪҜЫҢШұЫҢ</button>
      <label class="icon-btn" title="ШЁШ§ШұЪҜШ°Ш§ШұЫҢ ЩҫШҙШӘЫҢШЁШ§ЩҶ JSON" style="cursor:pointer"><i class="ti ti-database-import"></i> ШЁШ§ШІЫҢШ§ШЁЫҢ<input type="file" accept=".json" onchange="restoreGallery(event)" style="display:none"></label>
      <button class="icon-btn primary" onclick="document.getElementById('fi').click()"><i class="ti ti-file-upload"></i> ШўЩҫЩ„ЩҲШҜ DXF</button>
    </div>
    <div class="progress" id="pb"><div class="pfill" id="pf" style="width:0%"></div></div>

    <div class="gallery-wrap" id="galleryWrap"></div>
  </div>
</div>

<input type="file" id="fi" accept=".dxf" multiple style="display:none">
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="catModal">
  <div class="modal">
    <h3><i class="ti ti-tag"></i> Ш§ЩҶШӘШ®Ш§ШЁ ШҜШіШӘЩҮвҖҢШЁЩҶШҜЫҢ</h3>
    <div class="modal-cats" id="modalCats"></div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal()">Ш§ЩҶШөШұШ§ЩҒ</button>
      <button class="mbtn ok" onclick="confirmAssign()">ШӘШЈЫҢЫҢШҜ</button>
    </div>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<div class="ctx" id="ctx">
  <div class="ctx-item" onclick="ctxRename()"><i class="ti ti-pencil"></i> ШӘШәЫҢЫҢШұ ЩҶШ§Щ…</div>
  <div class="ctx-item red" onclick="ctxDelete()"><i class="ti ti-trash"></i> ШӯШ°ЩҒ ШҜШіШӘЩҮ</div>
</div>

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CONSTANTS & PALETTES (High Contrast CAD Neon)

// ШӘШ§ШЁШ№ ШӘШЁШҜЫҢЩ„ hex ШұЩҶЪҜ ШЁЩҮ rgb ШЁШұШ§ЫҢ Ш§ШіШӘЩҒШ§ШҜЩҮ ШҜШұ rgba()
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return isNaN(r)?'226,232,240':`${r},${g},${b}`;
}

// STORAGE (PRO INDUSTRIAL-GRADE INDEXEDDB)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const DB_NAME = 'CNCLAND_DXF_DB';
const DB_VER = 1;

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('designs')) db.createObjectStore('designs', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('categories')) db.createObjectStore('categories', { keyPath: 'id' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

function save() {
  initDB().then(db => {
    const tx = db.transaction(['designs', 'categories'], 'readwrite');
    const dStore = tx.objectStore('designs');
    const cStore = tx.objectStore('categories');

    dStore.clear();
    designs.forEach(d => dStore.put(d));

    cStore.clear();
    categories.forEach(c => cStore.put(c));
  }).catch(e => console.error('Ш®Ш·Ш§ЫҢ Ш°Ш®ЫҢШұЩҮвҖҢШіШ§ШІЫҢ Щ…ЪҜШ§ ШҜЫҢШӘШ§ШЁЫҢШі:', e));
}

function load() {
  initDB().then(db => {
    const tx = db.transaction(['designs', 'categories'], 'readonly');
    const dReq = tx.objectStore('designs').getAll();
    const cReq = tx.objectStore('categories').getAll();

    tx.oncomplete = () => {
      designs = dReq.result || [];
      categories = cReq.result || [];
      if (!categories.length) resetCats();
      ensureBuiltinCats();
      renderAll();
    };
  }).catch(e => {
    console.error('Ш®Ш·Ш§ЫҢ Щ„ЩҲШҜ ШҜЫҢШӘШ§ШЁЫҢШі:', e);
    designs = [];
    resetCats();
    ensureBuiltinCats();
    renderAll();
  });
}

function resetCats(){categories=[{id:'uncategorized',name:'ШЁШҜЩҲЩҶ ШҜШіШӘЩҮ',icon:'ti-folder-off',builtin:true}];}
function ensureBuiltinCats(){
  if(!categories.find(c=>c.id==='uncategorized'))
    categories.unshift({id:'uncategorized',name:'ШЁШҜЩҲЩҶ ШҜШіШӘЩҮ',icon:'ti-folder-off',builtin:true});
}

function toast(m,d=2500){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',d);}
function prog(p){const b=document.getElementById('pb');b.classList.toggle('show',p>0&&p<100);document.getElementById('pf').style.width=p+'%';}

async function handleFiles(files){
  const arr=Array.from(files).filter(f=>f.name.toLowerCase().endsWith('.dxf'));
  if(!arr.length){toast('ЩҒЩӮШ· ЩҒШ§ЫҢЩ„ ШөЩҶШ№ШӘЫҢ DXF ЩӮШ§ШЁЩ„ ЩӮШЁЩҲЩ„ Ш§ШіШӘ');return;}
  prog(5);
  let added=0;
  for(const f of arr){
    const txt=await f.text();
    prog(30);
    const ds=parseDXF(txt,f.name);
    designs.push(...ds);
    added+=ds.length;
    prog(80);
  }
  prog(100);
  setTimeout(()=>prog(0),500);
  save();
  renderAll();
  toast(`${added} ЩҒШұШІ Ъ©Ш§ШұЫҢ/Ш·ШұШӯ ШІЩҶЫҢ Ш§ШІ ${arr.length} ЩҒШ§ЫҢЩ„ Щ„ЩҲШҜ ШҙШҜ`);
}

function aciToHex(aci){
  const n=parseInt(aci);
  if(isNaN(n)||n<0) return null;
  if(n===0) return '#FFFFFF'; // BYLAYER placeholder
  if(n===256) return null;    // BYLAYER
  if(n===7) return '#FFFFFF';
  return ACI[n]||null;
}

function parseDXF(text,fname){
  const lines=text.split(/\r?\n/);
  const pairs=[];
  for(let i=0;i<lines.length-1;i+=2) pairs.push([lines[i].trim(),lines[i+1]?.trim()||'']);

  // в”Җв”Җ Ш®ЩҲШ§ЩҶШҜЩҶ ШұЩҶЪҜ Щ„Ш§ЫҢЩҮвҖҢЩҮШ§ Ш§ШІ TABLES в”Җв”Җ
  const layerColors={};
  let ti=0;
  while(ti<pairs.length){
    if(pairs[ti][0]==='2'&&pairs[ti][1]==='LAYER'){
      ti++;
      while(ti<pairs.length){
        if(pairs[ti][0]==='0'&&pairs[ti][1]==='LAYER'){
          ti++;
          let lname='',laci='';
          while(ti<pairs.length&&pairs[ti][0]!=='0'){
            if(pairs[ti][0]==='2') lname=pairs[ti][1];
            if(pairs[ti][0]==='62') laci=pairs[ti][1];
            ti++;
          }
          if(lname){
            const hex=aciToHex(laci);
            if(hex) layerColors[lname]=hex;
          }
          continue;
        }
        if(pairs[ti][0]==='0'&&pairs[ti][1]==='ENDTAB') break;
        ti++;
      }
    }
    ti++;
  }
  const polylines=[];
  let i=0,inEnt=false;
  while(i<pairs.length){
    const[c,v]=pairs[i];
    if(c==='2'&&v==='ENTITIES'){inEnt=true;i++;continue;}
    if(c==='0'&&v==='ENDSEC'){inEnt=false;i++;continue;}

    // в”Җв”Җ LWPOLYLINE (Щ…Ш®ШӘШөШ§ШӘ inline, ШЁШҜЩҲЩҶ VERTEX Ш¬ШҜШ§ЪҜШ§ЩҶЩҮ) в”Җв”Җ
    if(inEnt&&c==='0'&&v==='LWPOLYLINE'){
      let layer='',closed=false,ecolor='';
      const verts=[];
      i++;
      // Ш®ЩҲШ§ЩҶШҜЩҶ header ШӘШ§ Ш§ЩҲЩ„ЫҢЩҶ group-10
      while(i<pairs.length&&pairs[i][0]!=='0'){
        if(pairs[i][0]==='8') layer=pairs[i][1];
        if(pairs[i][0]==='70') closed=(parseInt(pairs[i][1])||0)&1;
        if(pairs[i][0]==='62') ecolor=pairs[i][1];
        i++;
      }
      // ШЁШ§ШІШЁЫҢЩҶЫҢ Щ…Ш¬ШҜШҜ Ш§ШІ Ш§ШЁШӘШҜШ§ЫҢ Ш§ЫҢЩҶШӘЫҢШӘЫҢ ШЁШұШ§ЫҢ Ш¬Щ…Ш№вҖҢШўЩҲШұЫҢ x/y/bulge
      // (ШЁШ№Ш¶ЫҢ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ header ЩҲ Щ…Ш®ШӘШөШ§ШӘ ШұШ§ Щ…Ш®Щ„ЩҲШ· Щ…ЫҢвҖҢЪ©ЩҶЩҶШҜ)
      let j=pairs.findIndex((p,idx)=>idx>0&&pairs[idx-1][0]==='0'&&pairs[idx-1][1]==='LWPOLYLINE');
      if(j<0) j=i-1;
      // ЩҫЫҢШҜШ§ Ъ©ШұШҜЩҶ Щ…ШӯШҜЩҲШҜЩҮ Ш§ЫҢЩҶ Ш§ЫҢЩҶШӘЫҢШӘЫҢ
      let k=j+1;
      while(k<pairs.length&&pairs[k][0]!=='0') k++;
      // Ш§ШіШӘШ®ШұШ§Ш¬ vertex-ЩҮШ§ Ш§ШІ Щ…ШӯШҜЩҲШҜЩҮ
      let curX=null,curY=null,curB=0;
      for(let m=j+1;m<k;m++){
        const[gc,gv]=pairs[m];
        if(gc==='10'){
          if(curX!==null&&curY!==null) verts.push({x:curX,y:curY,bulge:curB});
          curX=parseFloat(gv);curY=null;curB=0;
        } else if(gc==='20') curY=parseFloat(gv);
        else if(gc==='42') curB=parseFloat(gv)||0;
      }
      if(curX!==null&&curY!==null) verts.push({x:curX,y:curY,bulge:curB});
      if(verts.length>=2) polylines.push({layer,closed,color:aciToHex(ecolor),vertices:verts});
      continue;
    }

    // в”Җв”Җ POLYLINE/VERTEX Ъ©Щ„Ш§ШіЫҢЪ© в”Җв”Җ
    if(inEnt&&c==='0'&&v==='POLYLINE'){
      let layer='',closed=false,ecolor='';const vertices=[];
      i++;
      while(i<pairs.length&&pairs[i][0]!=='0'){
        if(pairs[i][0]==='8') layer=pairs[i][1];
        if(pairs[i][0]==='70'){closed=(parseInt(pairs[i][1])||0)&1;}
        if(pairs[i][0]==='62') ecolor=pairs[i][1];
        i++;
      }
      while(i<pairs.length){
        if(pairs[i][0]==='0'&&pairs[i][1]==='SEQEND'){i++;break;}
        if(pairs[i][0]==='0'&&pairs[i][1]==='VERTEX'){
          i++;let vx=null,vy=null,vb=0;
          while(i<pairs.length&&pairs[i][0]!=='0'){
            if(pairs[i][0]==='10') vx=parseFloat(pairs[i][1]);
            if(pairs[i][0]==='20') vy=parseFloat(pairs[i][1]);
            if(pairs[i][0]==='42') vb=parseFloat(pairs[i][1])||0;
            i++;
          }
          if(vx!==null&&vy!==null) vertices.push({x:vx,y:vy,bulge:vb});
        }else{i++;break;}
      }
      if(vertices.length>=2) polylines.push({layer,closed,color:aciToHex(ecolor),vertices});
      continue;
    }

    // в”Җв”Җ LINE Ш§ЫҢЩҶШӘЫҢШӘЫҢ в”Җв”Җ
    if(inEnt&&c==='0'&&v==='LINE'){
      let layer='',ecolor='';let x1=null,y1=null,x2=null,y2=null;
      i++;
      while(i<pairs.length&&pairs[i][0]!=='0'){
        if(pairs[i][0]==='8') layer=pairs[i][1];
        if(pairs[i][0]==='62') ecolor=pairs[i][1];
        if(pairs[i][0]==='10') x1=parseFloat(pairs[i][1]);
        if(pairs[i][0]==='20') y1=parseFloat(pairs[i][1]);
        if(pairs[i][0]==='11') x2=parseFloat(pairs[i][1]);
        if(pairs[i][0]==='21') y2=parseFloat(pairs[i][1]);
        i++;
      }
      if(x1!==null&&y1!==null&&x2!==null&&y2!==null)
        polylines.push({layer,closed:false,color:aciToHex(ecolor),vertices:[{x:x1,y:y1,bulge:0},{x:x2,y:y2,bulge:0}]});
      continue;
    }

    // в”Җв”Җ ARC Ш§ЫҢЩҶШӘЫҢШӘЫҢ в”Җв”Җ
    if(inEnt&&c==='0'&&v==='ARC'){
      let layer='',ecolor='';let cx=0,cy=0,r=0,sa=0,ea=360;
      i++;
      while(i<pairs.length&&pairs[i][0]!=='0'){
        if(pairs[i][0]==='8') layer=pairs[i][1];
        if(pairs[i][0]==='62') ecolor=pairs[i][1];
        if(pairs[i][0]==='10') cx=parseFloat(pairs[i][1]);
        if(pairs[i][0]==='20') cy=parseFloat(pairs[i][1]);
        if(pairs[i][0]==='40') r=parseFloat(pairs[i][1]);
        if(pairs[i][0]==='50') sa=parseFloat(pairs[i][1]);
        if(pairs[i][0]==='51') ea=parseFloat(pairs[i][1]);
        i++;
      }
      const verts=[];
      const span=ea>sa?ea-sa:ea-sa+360;
      const steps=Math.max(8,Math.round(span/5));
      for(let s=0;s<=steps;s++){
        const a=(sa+span*(s/steps))*Math.PI/180;
        verts.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a),bulge:0});
      }
      if(verts.length>=2) polylines.push({layer,closed:false,color:aciToHex(ecolor),vertices:verts});
      continue;
    }

    // в”Җв”Җ CIRCLE Ш§ЫҢЩҶШӘЫҢШӘЫҢ в”Җв”Җ
    if(inEnt&&c==='0'&&v==='CIRCLE'){
      let layer='',ecolor='';let cx=0,cy=0,r=0;
      i++;
      while(i<pairs.length&&pairs[i][0]!=='0'){
        if(pairs[i][0]==='8') layer=pairs[i][1];
        if(pairs[i][0]==='62') ecolor=pairs[i][1];
        if(pairs[i][0]==='10') cx=parseFloat(pairs[i][1]);
        if(pairs[i][0]==='20') cy=parseFloat(pairs[i][1]);
        if(pairs[i][0]==='40') r=parseFloat(pairs[i][1]);
        i++;
      }
      const verts=[];
      for(let s=0;s<=64;s++){
        const a=(s/64)*2*Math.PI;
        verts.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a),bulge:0});
      }
      polylines.push({layer,closed:true,color:aciToHex(ecolor),vertices:verts});
      continue;
    }

    // в”Җв”Җ SPLINE Ш§ЫҢЩҶШӘЫҢШӘЫҢ в”Җв”Җ
    if(inEnt&&c==='0'&&v==='SPLINE'){
      let layer='',ecolor='';const ctrlPts=[];
      const xArr=[],yArr=[];
      i++;
      while(i<pairs.length&&pairs[i][0]!=='0'){
        if(pairs[i][0]==='8') layer=pairs[i][1];
        if(pairs[i][0]==='62') ecolor=pairs[i][1];
        if(pairs[i][0]==='10') xArr.push(parseFloat(pairs[i][1]));
        if(pairs[i][0]==='20') yArr.push(parseFloat(pairs[i][1]));
        i++;
      }
      const n=Math.min(xArr.length,yArr.length);
      for(let s=0;s<n;s++) ctrlPts.push({x:xArr[s],y:yArr[s],bulge:0});
      if(ctrlPts.length>=2) polylines.push({layer,closed:false,color:aciToHex(ecolor),vertices:ctrlPts});
      continue;
    }

    i++;
  }
  const sheets=polylines.filter(p=>p.layer.toLowerCase()==='sheet').map(sp=>{
    if(sp.vertices.length<4) return null;
    const xs=sp.vertices.map(v=>v.x),ys=sp.vertices.map(v=>v.y);
    const b={minX:Math.min(...xs),maxX:Math.max(...xs),minY:Math.min(...ys),maxY:Math.max(...ys)};
    return (b.maxX-b.minX)>10&&(b.maxY-b.minY)>10?b:null;
  }).filter(Boolean);

  if(!sheets.length){
    const lm={};
    polylines.forEach(p=>{lm[p.layer]=(lm[p.layer]||0)+p.vertices.length;});
    return [{id:uid(),name:fname.replace(/\.dxf$/i,''),category:'',
      layers:Object.entries(lm).map(([n,c])=>({name:n,count:c})),
      layerColors,
      polylines,bounds:bounds(polylines),sourceFile:fname}];
  }
  return sheets.map((sh,idx)=>{
    const inside=polylines.filter(p=>{
      if(p.layer.toLowerCase()==='sheet'||!p.vertices.length) return false;
      const cx=p.vertices.reduce((s,v)=>s+v.x,0)/p.vertices.length;
      const cy=p.vertices.reduce((s,v)=>s+v.y,0)/p.vertices.length;
      return cx>=sh.minX-5&&cx<=sh.maxX+5&&cy>=sh.minY-5&&cy<=sh.maxY+5;
    });
    const lm={};inside.forEach(p=>{lm[p.layer]=(lm[p.layer]||0)+p.vertices.length;});
    return {id:uid(),name:`${fname.replace(/\.dxf$/i,'')}_${idx+1}`,category:'',
      layers:Object.entries(lm).map(([n,c])=>({name:n,count:c})),
      layerColors,
      polylines:inside,bounds:sh,
      size:{w:Math.round(sh.maxX-sh.minX),h:Math.round(sh.maxY-sh.minY)},
      sourceFile:fname};
  });
}
function bounds(polys){
  const xs=[],ys=[];
  polys.forEach(p=>p.vertices.forEach(v=>{xs.push(v.x);ys.push(v.y);}));
  if(!xs.length) return{minX:0,maxX:100,minY:0,maxY:100};
  return{minX:Math.min(...xs),maxX:Math.max(...xs),minY:Math.min(...ys),maxY:Math.max(...ys)};
}
function uid(){return Math.random().toString(36).slice(2,9);}

function catCount(id){
  // ШҙЩ…Ш§ШұШҙ ЩҮЩ…ЩҮ Ш·ШұШӯвҖҢЩҮШ§ЫҢ Ш§ЫҢЩҶ ШҜШіШӘЩҮ ЩҲ ШІЫҢШұЩ…Ш¬Щ…ЩҲШ№ЩҮвҖҢЩҮШ§ЫҢШҙ
  const ids=getAllSubIds(id);ids.push(id);
  if(id==='all') return designs.length;
  if(id==='uncategorized') return designs.filter(d=>!d.category).length;
  return designs.filter(d=>ids.includes(d.category)).length;
}

function getAllSubIds(id){
  const subs=categories.filter(c=>c.parentId===id).map(c=>c.id);
  return subs.flatMap(sid=>[sid,...getAllSubIds(sid)]);
}

function addCat(){
  const inp=document.getElementById('newCatInp');
  const name=inp.value.trim();
  if(!name){toast('ЩҶШ§Щ… ШҜШіШӘЩҮ ШұШ§ ЩҲШ§ШұШҜ Ъ©ЩҶЫҢШҜ');return;}
  if(categories.find(c=>c.name===name&&c.parentId===(document.getElementById('newCatParent').value||null))){
    toast('Ш§ЫҢЩҶ ШҜШіШӘЩҮ ЩӮШЁЩ„Ш§ЩӢ ЩҲШ¬ЩҲШҜ ШҜШ§ШұШҜ');return;
  }
  const icon=CAT_ICONS[categories.filter(c=>!c.builtin).length % CAT_ICONS.length];
  const parentId=document.getElementById('newCatParent').value||null;
  categories.push({id:'c'+uid(),name,icon,builtin:false,parentId,collapsed:false});
  inp.value='';
  save();renderCats();
  toast(`ШҜШіШӘЩҮ "${name}" Ш§ЩҒШІЩҲШҜЩҮ ШҙШҜ`);
}

function renderCats(){
  const el=document.getElementById('catList');
  el.innerHTML='';
  const all=mkCatItem({id:'all',name:'ЩҮЩ…ЩҮ Ш·ШұШӯвҖҢЩҮШ§',icon:'ti-layout-grid',builtin:true},designs.length);
  el.appendChild(all);
  el.appendChild(Object.assign(document.createElement('div'),{className:'cat-sep'}));
  // ШЁШҜЩҲЩҶ ШҜШіШӘЩҮ
  const unc=categories.find(c=>c.id==='uncategorized');
  if(unc) el.appendChild(mkCatItem(unc,catCount('uncategorized')));
  // ШҜШұШ®ШӘ ШҜШіШӘЩҮвҖҢЩҮШ§ (ШұЫҢШҙЩҮвҖҢЩҮШ§ Ш§ЩҲЩ„)
  const roots=categories.filter(c=>!c.builtin&&!c.parentId);
  roots.forEach(cat=>el.appendChild(mkCatTree(cat,0)));
  // ШўЩҫШҜЫҢШӘ select ШІЫҢШұЩ…Ш¬Щ…ЩҲШ№ЩҮ
  updateParentSelect();
}

function mkCatTree(cat,depth){
  const wrap=document.createElement('div');
  const children=categories.filter(c=>c.parentId===cat.id);
  const item=mkCatItem(cat,catCount(cat.id),depth,children.length>0);
  wrap.appendChild(item);
  if(children.length>0){
    const childWrap=document.createElement('div');
    childWrap.className='cat-children';
    childWrap.style.maxHeight=cat.collapsed?'0':'1000px';
    children.forEach(ch=>childWrap.appendChild(mkCatTree(ch,depth+1)));
    wrap.appendChild(childWrap);
  }
  return wrap;
}

function mkCatItem(cat,count,depth=0,hasChildren=false){
  const btn=document.createElement('button');
  btn.className='cat-item'+(activeCat===cat.id?' active':'')+(depth>0?' sub':'');
  btn.style.paddingRight=(8+depth*14)+'px';
  btn.dataset.id=cat.id;

  const toggleHtml=hasChildren
    ?`<span class="cat-toggle" onclick="event.stopPropagation();toggleCollapse('${cat.id}')">
        <i class="ti ${cat.collapsed?'ti-chevron-left':'ti-chevron-down'}" style="font-size:10px"></i>
      </span>`:
      `<span style="width:14px;flex-shrink:0"></span>`;

  const actionsHtml=cat.builtin?'':
    `<span class="cat-actions">
      <button class="cat-act-btn" onclick="event.stopPropagation();promptRenameCat('${cat.id}')" title="ШӘШәЫҢЫҢШұ ЩҶШ§Щ…"><i class="ti ti-pencil"></i></button>
      <button class="cat-act-btn" onclick="event.stopPropagation();promptAddSub('${cat.id}')" title="ШІЫҢШұЩ…Ш¬Щ…ЩҲШ№ЩҮ Ш¬ШҜЫҢШҜ"><i class="ti ti-folder-plus"></i></button>
      <button class="cat-act-btn red" onclick="event.stopPropagation();deleteCat('${cat.id}')" title="ШӯШ°ЩҒ ШҜШіШӘЩҮ"><i class="ti ti-trash"></i></button>
    </span>`;

  btn.innerHTML=`${toggleHtml}<i class="ti ${cat.icon} ci"></i><span class="cn">${cat.name}</span><span class="cc">${count}</span>${actionsHtml}`;
  btn.onclick=()=>{activeCat=cat.id;renderCats();renderGallery();};

  // drag-drop
  btn.addEventListener('dragover',e=>{e.preventDefault();btn.classList.add('drop-over');});
  btn.addEventListener('dragleave',()=>btn.classList.remove('drop-over'));
  btn.addEventListener('drop',e=>{
    e.preventDefault();btn.classList.remove('drop-over');
    const id=e.dataTransfer.getData('designId');
    if(!id) return;
    const d=designs.find(x=>x.id===id);
    if(!d) return;
    d.category=(cat.id==='all'||cat.id==='uncategorized')?'':cat.id;
    save();renderCats();renderGallery();
    toast(`Ш·ШұШӯ "${d.name}" ШЁЩҮ "${cat.name}" Щ…ЩҶШӘЩӮЩ„ ШҙШҜ`);
  });
  return btn;
}

function toggleCollapse(id){
  const cat=categories.find(c=>c.id===id);
  if(cat) cat.collapsed=!cat.collapsed;
  save();renderCats();
}

function promptRenameCat(id){
  const cat=categories.find(c=>c.id===id);if(!cat) return;
  const name=prompt('ЩҶШ§Щ… Ш¬ШҜЫҢШҜ ШҜШіШӘЩҮ:',cat.name);
  if(!name?.trim()) return;
  cat.name=name.trim();save();renderCats();renderGallery();
}

function promptAddSub(parentId){
  const parent=categories.find(c=>c.id===parentId);if(!parent) return;
  const name=prompt(`ЩҶШ§Щ… ШІЫҢШұЩ…Ш¬Щ…ЩҲШ№ЩҮ ШІЫҢШұ "${parent.name}":`);
  if(!name?.trim()) return;
  const icon=CAT_ICONS[categories.filter(c=>!c.builtin).length % CAT_ICONS.length];
  categories.push({id:'c'+uid(),name:name.trim(),icon,builtin:false,parentId,collapsed:false});
  parent.collapsed=false;
  save();renderCats();
  toast(`ШІЫҢШұЩ…Ш¬Щ…ЩҲШ№ЩҮ "${name.trim()}" Ш§Ш¶Ш§ЩҒЩҮ ШҙШҜ`);
}

function deleteCat(id){
  const cat=categories.find(c=>c.id===id);if(!cat) return;
  const subIds=getAllSubIds(id);
  const total=designs.filter(d=>[id,...subIds].includes(d.category)).length;
  const msg=subIds.length
    ?`ШҜШіШӘЩҮ "${cat.name}" ЩҲ ${subIds.length} ШІЫҢШұЩ…Ш¬Щ…ЩҲШ№ЩҮвҖҢШ§Шҙ ШӯШ°ЩҒ ШҙЩҲЩҶШҜШҹ${total?' Ш·ШұШӯвҖҢЩҮШ§ЫҢ ШўЩҶЩҮШ§ ШЁШҜЩҲЩҶ ШҜШіШӘЩҮ Щ…ЫҢвҖҢШҙЩҲЩҶШҜ.':''}`
    :`ШҜШіШӘЩҮ "${cat.name}" ШӯШ°ЩҒ ШҙЩҲШҜШҹ${total?` ${total} Ш·ШұШӯ ШЁШҜЩҲЩҶ ШҜШіШӘЩҮ Щ…ЫҢвҖҢШҙЩҲЩҶШҜ.`:''}`;
  if(!confirm(msg)) return;
  const allDel=[id,...subIds];
  designs.forEach(d=>{if(allDel.includes(d.category)) d.category='';});
  categories=categories.filter(c=>!allDel.includes(c.id));
  if(allDel.includes(activeCat)) activeCat='all';
  save();renderCats();renderGallery();
  toast(`ШҜШіШӘЩҮ "${cat.name}" ШӯШ°ЩҒ ШҙШҜ`);
}

function updateParentSelect(){
  const sel=document.getElementById('newCatParent');
  if(!sel) return;
  const prev=sel.value;
  sel.innerHTML='<option value="">вҖ” ШЁШҜЩҲЩҶ ШІЫҢШұЩ…Ш¬Щ…ЩҲШ№ЩҮ вҖ”</option>';
  function addOpts(cats,depth){
    cats.forEach(c=>{
      const opt=document.createElement('option');
      opt.value=c.id;
      opt.textContent='  '.repeat(depth)+(depth>0?'вҶі ':'')+c.name;
      sel.appendChild(opt);
      addOpts(categories.filter(x=>x.parentId===c.id),depth+1);
    });
  }
  addOpts(categories.filter(c=>!c.builtin&&!c.parentId),0);
  sel.value=prev;
}

// GALLERY DISPLAY VIEW
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function setSize(sz){
  cardSize=sz;
  ['L','M','S'].forEach(s=>document.getElementById('sz'+s).classList.toggle('on',s===sz));
  renderGallery();
}

function getVisible(){
  const q=document.getElementById('searchInp').value.toLowerCase();
  // Ш§ЪҜЩҮ ЫҢЩҮ ШҜШіШӘЩҮ Ш§ЩҶШӘШ®Ш§ШЁ ШҙШҜЩҮШҢ ШІЫҢШұЩ…Ш¬Щ…ЩҲШ№ЩҮвҖҢЩҮШ§Шҙ ШұЩҲ ЩҮЩ… ЩҶШҙЩҲЩҶ ШЁШҜЩҮ
  const activeCatIds=activeCat==='all'?null:
    activeCat==='uncategorized'?'uncategorized':
    [activeCat,...getAllSubIds(activeCat)];
  return designs.filter(d=>{
    const mq=!q||d.name.toLowerCase().includes(q)||d.layers.some(l=>l.name.toLowerCase().includes(q));
    let mc;
    if(!activeCatIds) mc=true;
    else if(activeCatIds==='uncategorized') mc=!d.category;
    else mc=activeCatIds.includes(d.category);
    return mq&&mc;
  });
}

function renderGallery(){
  const vis=getVisible();
  const wrap=document.getElementById('galleryWrap');
  const cat=activeCat==='all'?'ЩҮЩ…ЩҮ Ш·ШұШӯвҖҢЩҮШ§':activeCat==='uncategorized'?'ШЁШҜЩҲЩҶ ШҜШіШӘЩҮ':(categories.find(c=>c.id===activeCat)?.name||'');
  document.getElementById('topTitle').textContent=cat;
  document.getElementById('topCount').textContent=vis.length?`${vis.length} Ш·ШұШӯ ЩҶЩӮШҙЩҮ`:'';

  if(!designs.length){
    wrap.innerHTML='';
    wrap.appendChild(mkUploadZone());
    return;
  }
  if(!vis.length){
    wrap.innerHTML='<div class="empty-state"><i class="ti ti-search"></i><p>Ш·ШұШӯЫҢ ЩҫЫҢШҜШ§ ЩҶШҙШҜ!</p></div>';
    return;
  }

  const grid=document.createElement('div');
  grid.className='gallery-grid';
  grid.style.gridTemplateColumns=SIZE_COLS[cardSize];
  vis.forEach(d=>grid.appendChild(mkCard(d)));
  wrap.innerHTML='';
  wrap.appendChild(grid);
  vis.forEach(d=>{
    const cv=document.getElementById('gc_'+d.id);
    if(cv) setTimeout(()=>drawCanvas(cv,d,SIZE_H[cardSize]),15);
  });
  updateSelUI();
}

function mkCard(d){
  const cat=categories.find(c=>c.id===d.category);
  const isSel=selIds.has(d.id);
  const div=document.createElement('div');
  div.className='gcard'+(isSel?' sel':'');
  div.dataset.id=d.id;
  const h=SIZE_H[cardSize];
  div.innerHTML=`
    <input class="gcard-sel" type="checkbox" ${isSel?'checked':''} title="Ш§ЩҶШӘШ®Ш§ШЁ"
      onclick="event.stopPropagation();toggleSel('${d.id}',this)">
    <canvas class="gcard-canvas" id="gc_${d.id}" height="${h}" style="height:${h}px"></canvas>
    <div class="gcard-info">
      <div class="gcard-name" title="${d.name}">${d.name}</div>
      <div class="gcard-meta">${d.size?d.size.w+'Г—'+d.size.h+' mm':''} В· ${d.polylines.length} Ш®Ш· ШЁШұШҙ</div>
      ${cat?`<div class="gcard-cat"><i class="ti ${cat.icon}" style="font-size:9px"></i> ${cat.name}</div>`:''}
    </div>
    <div class="gcard-actions">
      <button class="ga-btn" onclick="event.stopPropagation();openModal(['${d.id}'])" title="ШҜШіШӘЩҮвҖҢШЁЩҶШҜЫҢ"><i class="ti ti-tag"></i></button>
      <button class="ga-btn" onclick="event.stopPropagation();openDetail('${d.id}')" title="Ш¬ШІЫҢЫҢШ§ШӘ ЩҲЪ©ШӘЩҲШұ"><i class="ti ti-eye"></i></button>
      <button class="ga-btn" onclick="event.stopPropagation();exportOne('${d.id}')" title="Ш®ШұЩҲШ¬ЫҢ ШӘЪ© Ъ©Ш§ШұЩҮ DXF"><i class="ti ti-download"></i></button>
      <button class="ga-btn red" onclick="event.stopPropagation();delDesign('${d.id}')" title="ШӯШ°ЩҒ ЩҶЩӮШҙЩҮ"><i class="ti ti-trash"></i></button>
    </div>`;
  
  div.draggable=true;
  div.addEventListener('dragstart',e=>{
    dragDesignId=d.id;div.classList.add('dragging');
    e.dataTransfer.setData('designId',d.id);
    e.dataTransfer.effectAllowed='move';
  });
  div.addEventListener('dragend',()=>{div.classList.remove('dragging');dragDesignId='';});
  div.addEventListener('click',()=>openDetail(d.id));
  return div;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// NEW HIGH-TECH CAD VIEWPORT RENDERER ENGINE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function drawCanvas(canvas,d,h){
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||canvas.parentElement?.offsetWidth||200;
  h=h||canvas.height;
  // ШұШІЩҲЩ„ЩҲШҙЩҶ ЩҲШ§ЩӮШ№ЫҢ ШЁШ§ DPR ШЁШұШ§ЫҢ ЩҶЩ…Ш§ЫҢШҙЪҜШұЩҮШ§ЫҢ Retina/Щ…ЩҲШЁШ§ЫҢЩ„
  canvas.width=Math.round(W*dpr);
  canvas.height=Math.round(h*dpr);
  canvas.style.width=W+'px';
  canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // ШҙШЁЫҢЩҮвҖҢШіШ§ШІ ЩҶЩ…Ш§ЫҢШҙЪҜШұ ШӘШ§ШұЫҢЪ© ШөЩҶШ№ШӘЫҢ Щ…Ш§ШҙЫҢЩҶвҖҢШўЩ„Ш§ШӘ ЩҒШұШІЪ©Ш§ШұЫҢ
  ctx.fillStyle='#12141C';
  ctx.fillRect(0,0,W,h);
  
  // ШұЩҶШҜШұ ЪҜШұЫҢШҜ Ш®Ш·ЩҲШ· Щ…ЫҢЩ„ЫҢвҖҢЩ…ШӘШұЫҢ ЩҫШівҖҢШІЩ…ЫҢЩҶЩҮ (Grid lines)
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  ctx.lineWidth=0.5;
  const step = 20;
  for(let x=0; x<W; x+=step){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
  }
  for(let y=0; y<h; y+=step){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  const b=d.bounds;
  const bw=(b.maxX-b.minX)||1,bh=(b.maxY-b.minY)||1;
  const pad=12,sc=Math.min((W-pad*2)/bw,(h-pad*2)/bh);
  const ox=(W-bw*sc)/2-b.minX*sc,oy=(h-bh*sc)/2-b.minY*sc;
  const tx=x=>x*sc+ox,ty=y=>h-(y*sc+oy);
  
  // Ъ©Ш§ШҜШұ Ш§ШЁШ№Ш§ШҜ ШҙЫҢШӘ (Bounding Box) ШЁШ§ ШұЩҶЪҜ ШўШЁЫҢ ЩҒЫҢШұЩҲШІЩҮвҖҢШ§ЫҢ Щ…Ш§ШӘ ЩҶШұЩ…вҖҢШ§ЩҒШІШ§ШұЫҢ
  ctx.strokeStyle='rgba(55,138,221,0.35)';
  ctx.lineWidth=0.7;
  ctx.setLineDash([4,4]);
  ctx.strokeRect(tx(b.minX),ty(b.maxY),bw*sc,bh*sc);
  ctx.setLineDash([]);
  
  // Ш§ЩҲЩ„ЩҲЫҢШӘ ШұЩҶЪҜ: ЩҶШ§Щ… Щ„Ш§ЫҢЩҮ (Щ…Ш№ШӘШЁШұШӘШұЫҢЩҶ ШҜШұ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ЫҢ CNC) > TABLES > entity
  // ЩҶШұЩ…вҖҢШ§ЩҒШІШ§Шұ CNC ШұЩҶЪҜ entity ШұШ§ ЩҮЩ…ЫҢШҙЩҮ ЩӮШұЩ…ШІ (ACI=1) ШөШ§ШҜШұ Щ…ЫҢвҖҢЪ©ЩҶШҜ вҖ” ШәЫҢШұЩӮШ§ШЁЩ„ Ш§Ш№ШӘЩ…Ш§ШҜ
  const layerColors=d.layerColors||{};
  const fallbackPalette=['#38BDF8','#4ADE80','#FB923C','#F472B6','#A78BFA','#FB7185','#34D399','#FACC15','#E2E8F0','#60A5FA'];
  const fallbackMap={};
  d.layers.forEach((l,idx)=>{fallbackMap[l.name]=fallbackPalette[idx%fallbackPalette.length];});

  function getColor(p){
    // Ыұ. ЩҶЪҜШ§ШҙШӘ Ш«Ш§ШЁШӘ Ш§ШіШ§Щ…ЫҢ ШҙЩҶШ§Ш®ШӘЩҮвҖҢШҙШҜЩҮ вҖ” Щ…Ш№ШӘШЁШұШӘШұЫҢЩҶ Щ…ЩҶШЁШ№
    if(LAYER_COLOR_MAP[p.layer]) return LAYER_COLOR_MAP[p.layer];
    // ЫІ. ШӘШҙШ®ЫҢШө ЩҮЩҲШҙЩ…ЩҶШҜ ШЁШұ Ш§ШіШ§Ші ЩҫЫҢШҙЩҲЩҶШҜ ЩҶШ§Щ… Щ„Ш§ЫҢЩҮ
    const ln=p.layer.toLowerCase();
    if(ln.startsWith('ball8'))         return '#FF0000';
    if(ln.startsWith('ball19'))        return '#00B4A0';
    if(ln.startsWith('ball25'))        return '#FF7800';
    if(ln.startsWith('2pele'))         return '#FF00FF';
    if(ln.startsWith('3pele'))         return '#FF6ECC';
    if(ln.startsWith('navdoni_k'))     return '#00AA00';
    if(ln.startsWith('navdonih9'))     return '#00C800';
    if(ln.startsWith('kaf_25mm'))      return '#0000FF';
    if(ln.startsWith('kaf_6mm'))       return '#8000FF';
    if(ln.startsWith('v90'))           return '#FF7800';
    if(ln.startsWith('v120'))          return '#FF1493';
    if(ln.startsWith('v140'))          return '#0096FF';
    if(ln.startsWith('golnoghtei'))    return '#FF7800';
    if(ln.startsWith('cut6mm'))        return '#0096FF';
    if(ln.startsWith('shiyar'))        return '#FF7800';
    if(ln.startsWith('vector'))        return '#CC0000';
    if(ln==='sheet')                   return '#888888';
    if(ln==='0')                       return '#FFFFFF';
    // Ыі. ШұЩҶЪҜ Щ„Ш§ЫҢЩҮ Ш§ШІ TABLES (ЩҒЩӮШ· Ш§ЪҜШұ Щ…Ш№ЩҶШ§ШҜШ§Шұ ШЁШ§ШҙШҜ)
    if(layerColors[p.layer]&&layerColors[p.layer]!=='#FFFFFF'&&layerColors[p.layer]!=='#000000') return layerColors[p.layer];
    // Ыҙ. ШұЩҶЪҜ entity вҖ” Ъ©Щ…ШӘШұЫҢЩҶ Ш§ЩҲЩ„ЩҲЫҢШӘ (ШҜШұ Ш§ЫҢЩҶ ЩҶЩҲШ№ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ ШәЫҢШұЩӮШ§ШЁЩ„ Ш§Ш№ШӘЩ…Ш§ШҜ)
    if(p.color&&p.color!=='#FFFFFF'&&p.color!=='#000000'&&p.color!=='#FF0000') return p.color;
    // Ыө. ЩҫШ§Щ„ШӘ ЩҫШҙШӘЫҢШЁШ§ЩҶ ШЁШұШ§ЫҢ Щ„Ш§ЫҢЩҮвҖҢЩҮШ§ЫҢ ЩҶШ§ШҙЩҶШ§Ш®ШӘЩҮ
    return fallbackMap[p.layer]||'#E2E8F0';
  }
  
  ctx.lineJoin='round';
  ctx.lineCap='round';

  // в”Җв”Җ Adaptive rendering ШЁШұ Ш§ШіШ§Ші ШӘШ№ШҜШ§ШҜ polyline в”Җв”Җ
  const total=d.polylines.length;
  // Ш¶Ш®Ш§Щ…ШӘ Ш®Ш·: Ъ©Щ…ШӘШұ Ш§ШІ 30 вҶ’ 1.2px  |  30-150 вҶ’ 0.7px  |  ШЁЫҢШҙШӘШұ вҶ’ 0.4px
  const lw = total<30 ? 1.2 : total<150 ? 0.7 : 0.4;
  // ШҙЩҒШ§ЩҒЫҢШӘ: ЩҮШұЪҶЩҮ ШЁЫҢШҙШӘШұШҢ Ъ©Щ…ШӘШұ ШұЩҲЫҢ ЩҮЩ… ШЁШІЩҶЩҶ
  const alpha = total<30 ? 1 : total<100 ? 0.85 : total<300 ? 0.65 : 0.45;
  // ШӯШҜШ§ЩӮЩ„ ШіШ§ЫҢШІ pixel ЫҢЩҮ polyline ШЁШұШ§ЫҢ ШұШіЩ… (Ш¬Щ„ЩҲЪҜЫҢШұЫҢ Ш§ШІ ЩҶЩҲЫҢШІ)
  const minPxSize = total>200 ? 2 : 1;

  // ШӘШ§ШЁШ№ Ъ©Щ…Ъ©ЫҢ: ШЁШІШұЪҜвҖҢШӘШұЫҢЩҶ ШЁЩҸШ№ШҜ ЫҢЪ© poly ШЁЩҮ pixel
  function polyPixelSize(p){
    let mnx=Infinity,mxx=-Infinity,mny=Infinity,mxy=-Infinity;
    p.vertices.forEach(v=>{
      if(v.x<mnx)mnx=v.x;if(v.x>mxx)mxx=v.x;
      if(v.y<mny)mny=v.y;if(v.y>mxy)mxy=v.y;
    });
    return Math.max((mxx-mnx)*sc,(mxy-mny)*sc);
  }

  // ШӘШ§ШЁШ№ ШұШіЩ… ЫҢЪ© polyline ШЁШ§ ЩӮЩҲШівҖҢЩҮШ§ЫҢ bulge
  function drawPoly(p){
    if(p.vertices.length<2) return;
    if(polyPixelSize(p)<minPxSize) return; // ШӯШ°ЩҒ ЩҶЩҲЫҢШІ ШұЫҢШІ
    const col=getColor(p);
    // ШұЩҶЪҜ ШЁШ§ alpha
    const rgb=hexToRgb(col);
    ctx.strokeStyle=`rgba(${rgb},${alpha})`;
    ctx.lineWidth=lw;
    ctx.beginPath();
    ctx.moveTo(tx(p.vertices[0].x),ty(p.vertices[0].y));
    for(let vi=0;vi<p.vertices.length-1;vi++){
      const v0=p.vertices[vi],v1=p.vertices[vi+1];
      const bulge=v0.bulge||0;
      if(Math.abs(bulge)<1e-9){
        ctx.lineTo(tx(v1.x),ty(v1.y));
      } else {
        const x1s=v0.x,y1s=v0.y,x2s=v1.x,y2s=v1.y;
        const dx=x2s-x1s,dy=y2s-y1s;
        const d2=Math.sqrt(dx*dx+dy*dy);
        if(d2<1e-9){ctx.lineTo(tx(v1.x),ty(v1.y));continue;}
        const theta=4*Math.atan(Math.abs(bulge));
        const r=d2/(2*Math.sin(theta/2));
        const sign=bulge>0?1:-1;
        const mx2=(x1s+x2s)/2,my2=(y1s+y2s)/2;
        const perpLen=Math.sqrt(Math.max(0,r*r-(d2/2)*(d2/2)));
        const cxArc=mx2+(-dy/d2*perpLen*sign);
        const cyArc=my2+(dx/d2*perpLen*sign);
        const saC=-Math.atan2(y1s-cyArc,x1s-cxArc);
        const eaC=-Math.atan2(y2s-cyArc,x2s-cxArc);
        ctx.arc(tx(cxArc),ty(cyArc),r*sc,saC,eaC,bulge>0);
      }
    }
    if(p.closed){
      const vL=p.vertices[p.vertices.length-1],v0=p.vertices[0];
      const bulge=vL.bulge||0;
      if(Math.abs(bulge)<1e-9){ctx.closePath();}
      else{
        const x1s=vL.x,y1s=vL.y,x2s=v0.x,y2s=v0.y;
        const dx=x2s-x1s,dy=y2s-y1s;
        const d2=Math.sqrt(dx*dx+dy*dy);
        if(d2>1e-9){
          const theta=4*Math.atan(Math.abs(bulge));
          const r=d2/(2*Math.sin(theta/2));
          const sign=bulge>0?1:-1;
          const mx2=(x1s+x2s)/2,my2=(y1s+y2s)/2;
          const perpLen=Math.sqrt(Math.max(0,r*r-(d2/2)*(d2/2)));
          const cxArc=mx2+(-dy/d2*perpLen*sign);
          const cyArc=my2+(dx/d2*perpLen*sign);
          ctx.arc(tx(cxArc),ty(cyArc),r*sc,
            -Math.atan2(y1s-cyArc,x1s-cxArc),
            -Math.atan2(y2s-cyArc,x2s-cxArc),bulge>0);
        }
        ctx.closePath();
      }
    }
    ctx.stroke();
  }

  // ШұШіЩ… Щ„Ш§ЫҢЩҮ ШЁЩҮ Щ„Ш§ЫҢЩҮ (closed Ш§ЩҲЩ„ШҢ ШЁШ№ШҜ open) ШЁШұШ§ЫҢ Ш®ЩҲШ§ЩҶШ§ЫҢЫҢ ШЁЫҢШҙШӘШұ
  d.polylines.filter(p=>p.closed).forEach(drawPoly);
  d.polylines.filter(p=>!p.closed).forEach(drawPoly);
  
  // ШұЫҢШіШӘ ЪҜЩ„ЩҲШЁШ§Щ„ Ш§ЩҒЪ©ШӘ ШіШ§ЫҢЩҮ ШЁШұШ§ЫҢ ШЁЩҮЫҢЩҶЩҮвҖҢШіШ§ШІЫҢ ЩҫШұЩҒЩҲШұЩ…ЩҶШі ЩҫШұШҜШ§ШІШҙ Щ„Ш§ЫҢЩҮвҖҢЩҮШ§
  ctx.shadowBlur=0;
}

function openDetail(id){
  const d=designs.find(x=>x.id===id);if(!d) return;
  const cat=categories.find(c=>c.id===d.category);
  const W=d.size?d.size.w:'вҖ”',H=d.size?d.size.h:'вҖ”';
  const tverts=d.polylines.reduce((s,p)=>s+p.vertices.length,0);
  const panel=document.getElementById('detailPanel');
  panel.innerHTML=`
    <div class="dp-head">
      <h3>${d.name}</h3>
      <button class="dp-close" onclick="closeDetail()"><i class="ti ti-x"></i></button>
    </div>
    <div class="dp-canvas-wrap"><canvas id="dpc_${d.id}" height="220" style="height:220px"></canvas></div>
    <div class="dp-body">
      <div class="dp-row">
        <span class="dp-label">ЩҶШ§Щ… Ъ©Ш§ШұЪҜШ§ЩҮЫҢ Ш·ШұШӯ:</span>
        <input class="dp-inp" style="flex:1" id="dpNameInp_${d.id}" value="${d.name}" onchange="renameD('${d.id}',this.value)">
        <button class="icon-btn" id="voiceBtn_${d.id}" onclick="startVoice('${d.id}')" title="ШӘШәЫҢЫҢШұ ЩҶШ§Щ… ШЁШ§ ШөШҜШ§" style="padding:5px 8px;flex-shrink:0">
          <i class="ti ti-microphone"></i>
        </button>
      </div>
      <div class="dp-row">
        <span class="dp-label">Щ…ЩҲЩӮШ№ЫҢШӘ ЩӮЩҒШіЩҮ/ШҜШіШӘЩҮ:</span>
        <button class="icon-btn" onclick="openModal(['${d.id}'])"><i class="ti ${cat?cat.icon:'ti-folder-off'}"></i> ${cat?cat.name:'ШЁШҜЩҲЩҶ ШҜШіШӘЩҮ'}</button>
      </div>
      <div class="dp-meta">
        <span><i class="ti ti-ruler-2"></i> Ъ©Ш§ШұЪҜЫҢШұ ЩӮШ·Ш№ЩҮ: ${W} Г— ${H} Щ…ЫҢЩ„ЫҢвҖҢЩ…ШӘШұ</span>
        <span><i class="ti ti-vector"></i> Ш®Ш·ЩҲШ· Щ„ЩҲЩҫ: ${d.polylines.length} Polyline</span>
        <span><i class="ti ti-point"></i> ЩҶЩӮШ§Ш· ШЁШұШҜШ§ШұЫҢ: ${tverts} Node</span>
        <span><i class="ti ti-file"></i> ЩҒШ§ЫҢЩ„ Щ…ШЁШҜШ§: ${d.sourceFile}</span>
      </div>
      <div class="dp-layers">
        ${d.layers.map((l,i)=>{
          const realCol=(d.layerColors&&d.layerColors[l.name])||LAYER_COLOR_MAP[l.name]||LCOLS[i%LCOLS.length];
          return `<div class="dp-lr"><div class="dot" style="background:${realCol}"></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.name}">${LNAMES[l.name]||l.name}</span><span style="color:var(--color-text-secondary);font-size:10px">${l.count} ЪҜШұЩҮ</span></div>`;
        }).join('')}
      </div>
      <div class="dp-acts">
        <button class="icon-btn primary" onclick="exportOne('${d.id}')"><i class="ti ti-download"></i> Ш®ШұЩҲШ¬ЫҢ DXF Ш§ШөЩ„Ш§ШӯвҖҢШҙШҜЩҮ</button>
        <button class="icon-btn danger" onclick="delDesign('${d.id}');closeDetail()"><i class="ti ti-trash"></i> ШӯШ°ЩҒ Ш§ШІ ШўШұШҙЫҢЩҲ</button>
      </div>
    </div>`;
  document.getElementById('detailOverlay').classList.add('show');
  setTimeout(()=>{
    const cv=document.getElementById('dpc_'+d.id);
    if(cv) drawCanvas(cv,d,220);
  },40);
}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('show');}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// UI SELECTION ACTIONS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function toggleSel(id,cb){
  if(cb.checked) selIds.add(id); else selIds.delete(id);
  document.querySelectorAll(`.gcard[data-id="${id}"]`).forEach(c=>c.classList.toggle('sel',cb.checked));
  updateSelUI();
}
function selAll(v){
  getVisible().forEach(d=>{if(v) selIds.add(d.id); else selIds.delete(d.id);});
  renderGallery();
}
function updateSelUI(){
  const n=selIds.size;
  const assignBtn=document.getElementById('assignBtn');
  const delSelBtn=document.getElementById('delSelBtn');
  const clearSelBtn=document.getElementById('clearSelBtn');
  assignBtn.style.display=n?'inline-flex':'none';
  delSelBtn.style.display=n?'inline-flex':'none';
  clearSelBtn.style.display=n?'inline-flex':'none';
  if(n){
    assignBtn.innerHTML=`<i class="ti ti-tag"></i> ШҜШіШӘЩҮвҖҢШЁЩҶШҜЫҢ (${n})`;
    delSelBtn.innerHTML=`<i class="ti ti-trash"></i> ШӯШ°ЩҒ (${n})`;
  }
}
function assignCatToSel(){
  if(!selIds.size){toast('Ш§ШЁШӘШҜШ§ Ш·ШұШӯвҖҢЩҮШ§ЫҢЫҢ ШұШ§ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶЫҢШҜ');return;}
  openModal([...selIds]);
}
function delSelected(){
  const n=selIds.size;
  if(!n) return;
  if(!confirm(`${n} Ш·ШұШӯ Ш§ЩҶШӘШ®Ш§ШЁвҖҢШҙШҜЩҮ ШӯШ°ЩҒ ШҙЩҲЩҶШҜШҹ`)) return;
  designs=designs.filter(d=>!selIds.has(d.id));
  selIds.clear();
  save();renderCats();renderGallery();
  updateSelUI();
  toast(`${n} Ш·ШұШӯ ШӯШ°ЩҒ ШҙШҜ`);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// MODAL MANAGEMENT
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function openModal(ids){
  assignTargetIds=ids;assignChosen='__NONE__';
  const list=document.getElementById('modalCats');
  list.innerHTML='';

  function mkMcat(icon,name,val,depth=0){
    const div=document.createElement('div');
    div.className='mcat';
    div.style.paddingRight=(10+depth*16)+'px';
    div.innerHTML=`<i class="ti ${icon}"></i> ${name}`;
    div.onclick=()=>{
      assignChosen=val;
      list.querySelectorAll('.mcat').forEach(x=>x.classList.remove('chosen'));
      div.classList.add('chosen');
    };
    list.appendChild(div);
  }

  function addTree(cats,depth){
    cats.forEach(cat=>{
      mkMcat(cat.icon,cat.name,cat.id,depth);
      const children=categories.filter(c=>c.parentId===cat.id);
      if(children.length) addTree(children,depth+1);
    });
  }

  mkMcat('ti-folder-off','ШЁШҜЩҲЩҶ ШҜШіШӘЩҮ','',0);
  addTree(categories.filter(c=>!c.builtin&&!c.parentId),0);
  document.getElementById('catModal').classList.add('show');
}
function closeModal(){document.getElementById('catModal').classList.remove('show');}
function confirmAssign(){
  if(assignChosen==='__NONE__'){toast('ЫҢЪ© ШҜШіШӘЩҮ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶЫҢШҜ');return;}
  assignTargetIds.forEach(id=>{const d=designs.find(x=>x.id===id);if(d) d.category=assignChosen;});
  selIds.clear();
  closeModal();closeDetail();
  save();renderCats();renderGallery();
  toast(`${assignTargetIds.length} ЩҒШ§ЫҢЩ„ ШЁШ§ Щ…ЩҲЩҒЩӮЫҢШӘ ШҜШіШӘЩҮвҖҢШЁЩҶШҜЫҢ ШҙШҜ`);
}

function renameD(id,name){
  const d=designs.find(x=>x.id===id);
  if(d){d.name=name.trim()||d.name;save();renderGallery();}
}
function delDesign(id){
  if(!confirm('Ш§ЫҢЩҶ ЩҶЩӮШҙЩҮ Ш§ШІ ЪҜШ§Щ„ШұЫҢ ШӯШ°ЩҒ ШҙЩҲШҜШҹ')) return;
  designs=designs.filter(x=>x.id!==id);selIds.delete(id);
  save();renderCats();renderGallery();
}

// EXPORT SYSTEM DXF GENERATOR
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function buildDXF(ds){
  const layers=new Set(ds.flatMap(d=>d.layers.map(l=>l.name)));layers.add('sheet');
  let f='0\nSECTION\n2\nHEADER\n9\n$ACADVER\n1\nAC1009\n0\nENDSEC\n';
  f+='0\nSECTION\n2\nTABLES\n0\nTABLE\n2\nLAYER\n70\n'+layers.size+'\n';
  layers.forEach(l=>{f+=`0\nLAYER\n2\n${l}\n70\n0\n62\n7\n6\nCONTINUOUS\n`;});
  f+='0\nENDTAB\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n';
  ds.forEach(d=>{
    const b=d.bounds;
    [[b.minX,b.minY],[b.minX,b.maxY],[b.maxX,b.maxY],[b.maxX,b.minY],[b.minX,b.minY]].forEach(([x,y],i)=>{
      if(i===0){f+='0\nPOLYLINE\n8\nsheet\n66\n1\n70\n1\n';}
      f+=`0\nVERTEX\n8\n0\n10\n${x.toFixed(5)}\n20\n${y.toFixed(5)}\n30\n0.0\n`;
    });
    f+='0\nSEQEND\n';
    d.polylines.forEach(p=>{
      f+=`0\nPOLYLINE\n8\n${p.layer}\n66\n1\n70\n${p.closed?1:0}\n`;
      p.vertices.forEach(v=>{
        f+=`0\nVERTEX\n8\n0\n10\n${v.x.toFixed(5)}\n20\n${v.y.toFixed(5)}\n30\n0.0\n`;
        if(v.bulge) f+=`42\n${v.bulge}\n`;
      });
      f+='0\nSEQEND\n';
    });
  });
  f+='0\nENDSEC\n0\nEOF\n';return f;
}
function dlDXF(content,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'application/dxf'}));
  a.download=name;a.click();
}
function exportOne(id){
  const d=designs.find(x=>x.id===id);if(!d) return;
  dlDXF(buildDXF([d]),d.name+'.dxf');toast(d.name+'.dxf ШҜШ§ЩҶЩ„ЩҲШҜ ШҙШҜ');
}

function backupGallery(){
  if(!designs.length){toast('ЩҮЫҢЪҶ Ш·ШұШӯЫҢ ШЁШұШ§ЫҢ ЩҫШҙШӘЫҢШЁШ§ЩҶвҖҢЪҜЫҢШұЫҢ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ');return;}
  toast('ШҜШұ ШӯШ§Щ„ ШӘЩҮЫҢЩҮ ЩҫШҙШӘЫҢШЁШ§ЩҶ... Щ„Ш·ЩҒШ§ЩӢ ШөШЁШұ Ъ©ЩҶЫҢШҜ',8000);
  prog(30);
  setTimeout(()=>{
    try{
      // ЩҒЩӮШ· Ш§Ш·Щ„Ш§Ш№Ш§ШӘ Ш¶ШұЩҲШұЫҢ ШЁШұШ§ЫҢ ШЁШ§ШІЫҢШ§ШЁЫҢ вҖ” ШЁШҜЩҲЩҶ polylines ШіЩҶЪҜЫҢЩҶ
      const lightDesigns = designs.map(d=>({
        id: d.id,
        name: d.name,
        category: d.category||'',
        layers: d.layers||[],
        layerColors: d.layerColors||{},
        bounds: d.bounds||{},
        size: d.size||null,
        sourceFile: d.sourceFile||'',
        // polylines ШұЩҲ ЩҮЩ… Ш°Ш®ЫҢШұЩҮ Щ…ЫҢвҖҢЪ©ЩҶЫҢЩ… ЪҶЩҲЩҶ ШЁШұШ§ЫҢ ШұШіЩ… Щ„Ш§ШІЩ…ЩҮ
        polylines: d.polylines||[]
      }));
      prog(60);
      const data={
        version:'DXF_GALLERY_BACKUP_v6',
        exportedAt:new Date().toISOString(),
        categories:categories,
        designs:lightDesigns
      };
      const json = JSON.stringify(data);
      prog(85);
      const blob=new Blob([json],{type:'application/json'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=`dxf_gallery_backup_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
      prog(100);
      setTimeout(()=>prog(0),800);
      toast(`вң“ ЩҫШҙШӘЫҢШЁШ§ЩҶ ${designs.length} Ш·ШұШӯ ШҜШ§ЩҶЩ„ЩҲШҜ ШҙШҜ`);
    }catch(err){
      prog(0);
      toast('вқҢ Ш®Ш·Ш§ ШҜШұ ЩҫШҙШӘЫҢШЁШ§ЩҶвҖҢЪҜЫҢШұЫҢ: '+err.message);
      console.error(err);
    }
  },100);
}

function restoreGallery(event){
  const file=event.target.files[0];
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.designs||!Array.isArray(data.designs)){toast('вқҢ ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ Щ…Ш№ШӘШЁШұ ЩҶЫҢШіШӘ');return;}
      if(!confirm(`вҡ пёҸ ШЁШ§ШІЫҢШ§ШЁЫҢ ${data.designs.length} Ш·ШұШӯ ЩҲ ${(data.categories||[]).length} ШҜШіШӘЩҮШҹ\nЪҜШ§Щ„ШұЫҢ ЩҒШ№Щ„ЫҢ Ш¬Ш§ЫҢЪҜШІЫҢЩҶ Щ…ЫҢвҖҢШҙЩҲШҜ.`))return;
      designs=data.designs;
      if(data.categories&&data.categories.length){
        categories=data.categories;
      }else{
        resetCats();
      }
      ensureBuiltinCats();
      save();
      renderAll();
      toast(`вң“ ${designs.length} Ш·ШұШӯ ЩҲ ${categories.length} ШҜШіШӘЩҮ ШЁШ§ШІЫҢШ§ШЁЫҢ ШҙШҜ`);
    }catch(err){
      toast('вқҢ Ш®Ш·Ш§ ШҜШұ Ш®ЩҲШ§ЩҶШҜЩҶ ЩҒШ§ЫҢЩ„: '+err.message);
    }
  };
  r.readAsText(file);
  event.target.value='';
}

function mkUploadZone(){
  const div=document.createElement('div');
  div.className='upload-zone';
  div.innerHTML=`<i class="ti ti-file-upload"></i><p>ЩҒШ§ЫҢЩ„ Щ…ЪҜШ§ Ш·ШұШӯ DXF ШұШ§ Ш§ЫҢЩҶШ¬Ш§ ШұЩҮШ§ Ъ©ЩҶЫҢШҜ ЫҢШ§ Ъ©Щ„ЫҢЪ© Ъ©ЩҶЫҢШҜ</p><span>ЩҫШҙШӘЫҢШЁШ§ЩҶЫҢ Ъ©Ш§Щ…Щ„: DXF ASCII ШЁШ§ ШіШ§Ш®ШӘШ§ШұЩҮШ§ЫҢ ШЁШұШҜШ§ШұЫҢ POLYLINE/VERTEX</span>`;
  div.addEventListener('click',()=>document.getElementById('fi').click());
  div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag');});
  div.addEventListener('dragleave',()=>div.classList.remove('drag'));
  div.addEventListener('drop',e=>{e.preventDefault();div.classList.remove('drag');handleFiles(e.dataTransfer.files);});
  return div;
}
document.getElementById('galleryWrap').addEventListener('dragover',e=>{
  if(e.dataTransfer.types.includes('Files')) e.preventDefault();
});
document.getElementById('galleryWrap').addEventListener('drop',e=>{
  if(e.dataTransfer.files.length){e.preventDefault();handleFiles(e.dataTransfer.files);}
});

function renderAll(){renderCats();renderGallery();}

// VOICE INPUT ENGINE (Web Speech API)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let _voiceRec=null;
function _getSR(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Щ…ШұЩҲШұЪҜШұ ШҙЩ…Ш§ Ш§ШІ ЩҲШұЩҲШҜЫҢ ШөЩҲШӘЫҢ ЩҫШҙШӘЫҢШЁШ§ЩҶЫҢ ЩҶЩ…ЫҢвҖҢЪ©ЩҶШҜ');return null;}
  const r=new SR();
  r.lang='fa-IR';
  r.interimResults=false;
  r.maxAlternatives=1;
  return r;
}

function startVoice(designId){
  const btn=document.getElementById('voiceBtn_'+designId);
  const inp=document.getElementById('dpNameInp_'+designId);
  if(!btn||!inp) return;
  if(_voiceRec){_voiceRec.abort();_voiceRec=null;_resetVoiceBtn(btn);return;}
  const r=_getSR();if(!r) return;
  _voiceRec=r;
  btn.innerHTML='<i class="ti ti-microphone" style="color:#E24B4A;animation:pulse 0.8s infinite"></i>';
  btn.title='ШҜШұ ШӯШ§Щ„ Ш¶ШЁШ·... Ъ©Щ„ЫҢЪ© ШЁШұШ§ЫҢ Щ„ШәЩҲ';
  toast('рҹҺӨ ШҜШұ ШӯШ§Щ„ ЪҜЩҲШҙ ШҜШ§ШҜЩҶ... ЩҶШ§Щ… Ш·ШұШӯ ШұШ§ ШЁЪҜЩҲЫҢЫҢШҜ',3000);
  r.onresult=e=>{
    const t=e.results[0][0].transcript.trim();
    inp.value=t;
    renameD(designId,t);
    toast('вң… ЩҶШ§Щ… Ш·ШұШӯ: В«'+t+'В» Ш°Ш®ЫҢШұЩҮ ШҙШҜ');
  };
  r.onerror=e=>{
    toast('Ш®Ш·Ш§ЫҢ Щ…ЫҢЪ©ШұЩҲЩҒЩҲЩҶ: '+e.error);
  };
  r.onend=()=>{
    _voiceRec=null;
    _resetVoiceBtn(btn);
  };
  r.start();
}

function startVoiceCat(){
  const inp=document.getElementById('newCatInp');
  const btn=document.querySelector('.new-cat-row .new-cat-btn');
  if(!inp) return;
  if(_voiceRec){_voiceRec.abort();_voiceRec=null;inp.placeholder='ШҜШіШӘЩҮ Ш¬ШҜЫҢШҜ...';return;}
  const r=_getSR();if(!r) return;
  _voiceRec=r;
  inp.placeholder='рҹҺӨ ШҜШұ ШӯШ§Щ„ ЪҜЩҲШҙ ШҜШ§ШҜЩҶ...';
  toast('рҹҺӨ ЩҶШ§Щ… ШҜШіШӘЩҮ ШұШ§ ШЁЪҜЩҲЫҢЫҢШҜ',3000);
  r.onresult=e=>{
    const t=e.results[0][0].transcript.trim();
    inp.value=t;
    toast('вң… ЩҶШ§Щ… ШҜШіШӘЩҮ: В«'+t+'В» вҖ” ШЁШұШ§ЫҢ Ш°Ш®ЫҢШұЩҮ + ШЁШІЩҶЫҢШҜ');
  };
  r.onerror=e=>toast('Ш®Ш·Ш§ЫҢ Щ…ЫҢЪ©ШұЩҲЩҒЩҲЩҶ: '+e.error);
  r.onend=()=>{_voiceRec=null;inp.placeholder='ШҜШіШӘЩҮ Ш¬ШҜЫҢШҜ...';};
  r.start();
}

function _resetVoiceBtn(btn){
  if(btn){btn.innerHTML='<i class="ti ti-microphone"></i>';btn.title='ШӘШәЫҢЫҢШұ ЩҶШ§Щ… ШЁШ§ ШөШҜШ§';}
}
